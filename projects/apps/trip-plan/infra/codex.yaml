apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trip-plan-codex-home
  namespace: dev
  labels:
    app.kubernetes.io/name: trip-plan-codex
    app.kubernetes.io/part-of: trip-plan
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: trip-plan-codex
  namespace: dev
  labels:
    app.kubernetes.io/name: trip-plan-codex
    app.kubernetes.io/part-of: trip-plan
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: trip-plan-codex
  ports:
    - name: websocket
      port: 8765
      targetPort: websocket
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-plan-codex
  namespace: dev
  labels:
    app.kubernetes.io/name: trip-plan-codex
    app.kubernetes.io/part-of: trip-plan
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trip-plan-codex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trip-plan-codex
        app.kubernetes.io/part-of: trip-plan
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: codex
          image: registry.wukong.monster/dev/trip-plan/codex-app-server:0.2.0
          imagePullPolicy: IfNotPresent
          command:
            - codex
            - app-server
            - --listen
            - ws://0.0.0.0:8765
          env:
            - name: HOME
              value: /ai-chat
            - name: CODEX_HOME
              value: /ai-chat/.codex
          ports:
            - name: websocket
              containerPort: 8765
          readinessProbe:
            httpGet:
              path: /healthz
              port: websocket
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: websocket
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: codex-home
              mountPath: /ai-chat/.codex
      volumes:
        - name: codex-home
          persistentVolumeClaim:
            claimName: trip-plan-codex-home
