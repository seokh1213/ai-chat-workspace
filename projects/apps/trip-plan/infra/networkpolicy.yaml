apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trip-plan-app-ingress
  namespace: trip-plan
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trip-plan-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
      ports:
        - protocol: TCP
          port: 8081
---
