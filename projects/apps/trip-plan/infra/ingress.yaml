apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trip-plan
  namespace: trip-plan
  labels:
    app.kubernetes.io/name: trip-plan
    app.kubernetes.io/part-of: trip-plan
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: trip-plan-app
      port:
        number: 80
  tls:
    - hosts:
        - trip-plan
