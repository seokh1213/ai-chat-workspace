apiVersion: v1
kind: Service
metadata:
  name: trip-plan-postgres
  namespace: dev
  labels:
    app.kubernetes.io/name: trip-plan-postgres
    app.kubernetes.io/part-of: trip-plan
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: trip-plan-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trip-plan-postgres
  namespace: dev
  labels:
    app.kubernetes.io/name: trip-plan-postgres
    app.kubernetes.io/part-of: trip-plan
spec:
  serviceName: trip-plan-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trip-plan-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trip-plan-postgres
        app.kubernetes.io/part-of: trip-plan
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: trip-plan-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trip-plan-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: trip-plan-secrets
                  key: postgres-db
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
