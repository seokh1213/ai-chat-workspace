apiVersion: v1
kind: Service
metadata:
  name: trip-plan-app
  namespace: trip-plan
  labels:
    app.kubernetes.io/name: trip-plan-app
    app.kubernetes.io/part-of: trip-plan
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: trip-plan-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-plan-app
  namespace: trip-plan
  labels:
    app.kubernetes.io/name: trip-plan-app
    app.kubernetes.io/part-of: trip-plan
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trip-plan-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trip-plan-app
        app.kubernetes.io/part-of: trip-plan
    spec:
      containers:
        - name: app
          image: registry.internal/trip-plan/app:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: TRIP_PLANNER_DB_URL
              value: jdbc:postgresql://trip-plan-postgres:5432/trip_plan
            - name: TRIP_PLANNER_DB_USER
              valueFrom:
                secretKeyRef:
                  name: trip-plan-secrets
                  key: postgres-user
            - name: TRIP_PLANNER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trip-plan-secrets
                  key: postgres-password
            - name: TRIP_PLANNER_DB_POOL_SIZE
              value: "5"
            - name: CODEX_APP_SERVER_URL
              value: ws://trip-plan-codex:8765
            - name: CODEX_APP_SERVER_MANAGED
              value: "false"
            - name: CODEX_APP_SERVER_CWD
              value: /tmp
            - name: CODEX_APP_SERVER_TIMEOUT_SECONDS
              value: "180"
            - name: TRIP_PLANNER_CHAT_RUN_LOG_LEVEL
              value: INFO
            - name: TRIP_PLANNER_CODEX_EVENT_LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
