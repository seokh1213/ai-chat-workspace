<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f6f8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="여행 플래너" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <title>AI 여행 플래너</title>
    <script>
      (() => {
        try {
          const stored = window.localStorage.getItem("trip-planner-color-theme");
          const theme = stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute("content", theme === "dark" ? "#111318" : "#f5f6f8");
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f5f6f8;
        color: #24262d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html[data-theme="dark"] body {
        background: #111318;
        color: #eef2f7;
      }

      .boot-splash {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 20px;
      }

      .boot-splash-inner {
        display: grid;
        width: min(360px, calc(100vw - 40px));
        place-items: center;
        gap: 12px;
        color: #5f6673;
        text-align: center;
      }

      html[data-theme="dark"] .boot-splash-inner {
        color: #b8c0cc;
      }

      .boot-splash-inner img {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        box-shadow: 0 12px 28px rgba(36, 38, 45, 0.08);
      }

      .boot-splash-spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(31, 193, 182, 0.18);
        border-top-color: #1fc1b6;
        border-radius: 999px;
        animation: boot-splash-spin 0.9s linear infinite;
      }

      .boot-splash-inner strong {
        color: #24262d;
      }

      html[data-theme="dark"] .boot-splash-inner strong {
        color: #eef2f7;
      }

      .boot-splash-inner span {
        font-size: 13px;
        line-height: 1.45;
      }

      @keyframes boot-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-splash" aria-label="앱 로딩 중">
        <section class="boot-splash-inner">
          <img src="/app-icon.svg" alt="" />
          <div class="boot-splash-spinner" aria-hidden="true"></div>
          <strong>여행 작업실을 준비하는 중입니다</strong>
          <span>네트워크 연결과 앱 설정을 확인하고 있습니다.</span>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
