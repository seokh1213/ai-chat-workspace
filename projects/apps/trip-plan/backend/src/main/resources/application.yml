spring:
  application:
    name: trip-planner
  datasource:
    url: ${TRIP_PLANNER_DB_URL:jdbc:sqlite:.data/trip-planner-backend.sqlite}
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: PRAGMA foreign_keys=ON
      maximum-pool-size: 1
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8081}

logging:
  level:
    app.tripplanner.chat.ChatRunService: ${TRIP_PLANNER_CHAT_RUN_LOG_LEVEL:DEBUG}
    app.tripplanner.ai.CodexAppServerClient: ${TRIP_PLANNER_CODEX_EVENT_LOG_LEVEL:DEBUG}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  seed:
    enabled: false
    locations: classpath*:db/seed/*.sql
  ai:
    codex-app-server:
      url: ${CODEX_APP_SERVER_URL:ws://127.0.0.1:8765}
      model: ${CODEX_APP_SERVER_MODEL:gpt-5.4-mini}
      effort: ${CODEX_APP_SERVER_EFFORT:medium}
      timeout-seconds: ${CODEX_APP_SERVER_TIMEOUT_SECONDS:180}
      cwd: ${CODEX_APP_SERVER_CWD:/tmp}
      managed: ${CODEX_APP_SERVER_MANAGED:false}
      executable: ${CODEX_APP_SERVER_EXECUTABLE:codex}
      process-working-directory: ${CODEX_APP_SERVER_PROCESS_CWD:}
      startup-timeout-seconds: ${CODEX_APP_SERVER_STARTUP_TIMEOUT_SECONDS:8}
      restart-on-exit: ${CODEX_APP_SERVER_RESTART_ON_EXIT:false}
      restart-delay-seconds: ${CODEX_APP_SERVER_RESTART_DELAY_SECONDS:2}
    openai-compatible:
      base-url: ${OPENAI_COMPATIBLE_BASE_URL:https://api.openai.com/v1/chat/completions}
      api-key: ${OPENAI_COMPATIBLE_API_KEY:}
      model: ${OPENAI_COMPATIBLE_MODEL:gpt-5.4-mini}
      timeout-seconds: ${OPENAI_COMPATIBLE_TIMEOUT_SECONDS:180}
    openrouter:
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:openai/gpt-5.2}
      referer: ${OPENROUTER_REFERER:}
      title: ${OPENROUTER_TITLE:Trip Planner}
      timeout-seconds: ${OPENROUTER_TIMEOUT_SECONDS:180}
